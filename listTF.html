<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器文件管理器</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1100px; 
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
        }

        .status-bar {
            background: #ebf5ff;
            color: #0056b3;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #fafafa;
            color: #666;
        }

        .file-name {
            font-weight: 500;
            color: #333;
        }

        .time-text {
            color: #7f8c8d;
            font-size: 13px;
            white-space: nowrap;
        }

        .type-tag {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #eee;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-preview { background-color: #3498db; color: white; }
        .btn-preview:hover { background-color: #2980b9; }

        .btn-download { background-color: #2ecc71; color: white; }
        .btn-download:hover { background-color: #27ae60; }

        .btn-delete { background-color: #e74c3c; color: white; }
        .btn-delete:hover { background-color: #c0392b; }

        .error-msg {
            background: #fff1f0;
            color: #cf1322;
            border: 1px solid #ffa39e;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>服务器文件列表</h1>
    <div id="status" class="status-bar">正在初始化系统...</div>
    <div id="error-container"></div>

    <table id="main-table" style="display: none;">
        <thead>
        <tr>
            <th>名称</th>
            <th>类型</th>
            <th>最后修改时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<script>
    // 💡 核心修改点 1：配置你的 Java 服务器地址
    // 如果网页和 Java 后端在同一台机器同端口运行，保持空字符串 '' 即可
    const SERVER_BASE_URL = ''; 

    async function init() {
        const status = document.getElementById('status');
        const errorContainer = document.getElementById('error-container');

        try {
            await refreshList();
        } catch (err) {
            errorContainer.innerHTML = `<div class="error-msg">初始化失败: ${err.message}</div>`;
            status.innerText = "状态：异常";
        }
    }

    // 格式化时间函数
    function formatTime(timestamp) {
        if (!timestamp) return "--";
        const date = new Date(timestamp * 1000);
        return date.toLocaleString('zh-CN', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    async function refreshList() {
        const status = document.getElementById('status');
        const table = document.getElementById('main-table');
        const tbody = document.getElementById('list-body');

        try {
            status.innerText = `正在读取服务器目录...`;
            
            // 💡 核心修改点 2：改为请求 Java 后端整合好的全量文件列表
            const listRes = await fetch(`${SERVER_BASE_URL}/api/listFiles`);
            if (!listRes.ok) throw new Error(`无法获取文件列表: ${listRes.status}`);
            
            let files = await listRes.json();

            // 按时间降序排序（最新的在上面）
            files.sort((a, b) => (b.time || 0) - (a.time || 0));

            tbody.innerHTML = '';
            files.forEach(file => {
                const tr = document.createElement('tr');
                const isFile = file.type !== 'dir';

                // 💡 核心修改点 3：根据文件名前缀自动拆分其所属的 Java 子文件夹路径 (rank 还是 history)
                const folderType = file.name.startsWith('rank_') ? 'rank' : 'history';
                const fileUrl = `${SERVER_BASE_URL}/api/getFile?name=${file.name}&type=${folderType}`;

                tr.innerHTML = `
                    <td class="file-name">${file.name}</td>
                    <td><span class="type-tag">${file.type === 'dir' ? '文件夹' : '文件'}</span></td>
                    <td class="time-text">${formatTime(file.time)}</td>
                    <td class="actions">
                        ${isFile ? `<a href="${fileUrl}" class="btn btn-preview" target="_blank">预览</a>` : ''}
                        ${isFile ? `<a href="${fileUrl}" download="${file.name}" class="btn btn-download">下载</a>` : ''}
                        <button class="btn btn-delete" onclick="doDelete('${file.name}')">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            table.style.display = 'table';
            status.innerText = `就绪 - 数据读取自本地 Java 服务器`;
        } catch (err) {
            status.innerText = "读取列表失败";
            console.error(err);
        }
    }

    async function doDelete(fileName) {
        if (!confirm(`确定要删除文件 [ ${fileName} ] 吗？该操作不可逆！`)) {
            return;
        }

        const status = document.getElementById('status');
        try {
            status.innerText = `正在请求删除: ${fileName}...`;
            
            // 💡 核心修改点 4：指向 Java 新增的删除接口
            const res = await fetch(`${SERVER_BASE_URL}/api/deleteFile?name=${fileName}`);

            if (res.ok) {
                const resultText = await res.text();
                if (resultText === "Success") {
                    await refreshList();
                } else {
                    alert("删除失败: " + resultText);
                }
            } else {
                alert("删除失败，服务器响应异常: " + res.status);
            }
        } catch (err) {
            alert("请求错误: " + err.message);
        } finally {
            status.innerText = `就绪`;
        }
    }

    init();
</script>

</body>
</html>
