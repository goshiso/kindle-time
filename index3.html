<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock For Kindle</title>
<style>
  @font-face {
    font-family: TIME;
    src: url("fix7.ttf") format("truetype");
  }

  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: white;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column; /* 改为垂直排列 */
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  .time {
    font-family: TIME, sans-serif;
    font-size: 120px;  
    text-align: center;
    line-height: 1;
    color: red;
    white-space: nowrap;
    display: flex;
    align-items: center;
  }

  .dot {
    font-family: sans-serif;
    margin: 0 10px;
    font-size: 1.5em; 
    position: relative;
    top: -25px; 
    color: red; /* 确保冒号也是红色 */
  }

  /* 图片样式 */
  .random-pic {
    margin-top: 30px; /* 时间和图片之间的间距 */
    max-width: 80%;   /* 宽度占屏幕80%，防止撑破布局 */
    height: auto;
    border-radius: 8px; /* 可选：给图片加一点圆角 */
  }
</style>
</head>
<body>

<div class="app">
  <div class="time" id="clock">
    <span id="hh">00</span><span class="dot">:</span><span id="mm">00</span>
  </div>
  
  <img src="https://picsum.photos/800/600" alt="Random Image" class="random-pic">
</div>

<script>
(function(){
  var domHH = document.getElementById('hh');
  var domMM = document.getElementById('mm');

  function render() {
    var now = new Date();
    
    // 强制 +9 时区
    var len = now.getTime();
    var offset = now.getTimezoneOffset() * 60000;
    var utcTime = len + offset;
    now = new Date(utcTime + 3600000 * 9); 

    function pad2(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    var hh = pad2(now.getHours());
    var mm = pad2(now.getMinutes());

    if (domHH.innerHTML !== hh) domHH.innerHTML = hh;
    if (domMM.innerHTML !== mm) domMM.innerHTML = mm;
  }

  function scheduleNextMinuteUpdate() {
    var now = new Date();
    var msToNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
    
    setTimeout(function () {
      render();
      scheduleNextMinuteUpdate();
    }, msToNextMinute + 50);
  }

  render();
  scheduleNextMinuteUpdate();
})();
</script>

</body>
</html>
