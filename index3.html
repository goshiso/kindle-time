<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock For Kindle</title>
<style>
  @font-face {
    font-family: TIME;
    src: url("fix7.ttf") format("truetype");
  }

  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: white;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  .time {
    font-family: TIME, sans-serif;
    font-size: 120px;  
    text-align: center;
    line-height: 1;
    color: black;
    white-space: nowrap;
    display: flex;
    align-items: center;
  }

  .dot {
    font-family: sans-serif;
    margin: 0 10px;
    font-size: 1.5em; 
    position: relative;
    top: -5px;
    color: black;
  }

  .random-pic {
    margin-top: 20px;
    max-width: 90%;
    max-height: 60vh; /* 限制高度，防止图片太长把时间挤出屏幕 */
    height: auto;
    border-radius: 5px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="time" id="clock">
    <span id="hh">00</span><span class="dot">:</span><span id="mm">00</span>
  </div>
  
  <img id="bg-img" src="https://picsum.photos/800/600" alt="Random Image" class="random-pic">
</div>

<script>
(function(){
  var domHH = document.getElementById('hh');
  var domMM = document.getElementById('mm');
  var domImg = document.getElementById('bg-img');

  function render() {
    var now = new Date();
    
    // 强制 +9 时区
    var len = now.getTime();
    var offset = now.getTimezoneOffset() * 60000;
    var utcTime = len + offset;
    var dateAdjusted = new Date(utcTime + 3600000 * 9); 

    function pad2(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    var hh = pad2(dateAdjusted.getHours());
    var mm = pad2(dateAdjusted.getMinutes());

    // 1. 刷新时间文本
    if (domHH.innerHTML !== hh) domHH.innerHTML = hh;
    if (domMM.innerHTML !== mm) {
        domMM.innerHTML = mm;
        // 2. 只有在分钟变化时，才局部刷新图片
        // 通过添加随机参数绕过缓存
        domImg.src = "https://picsum.photos/800/600?t=" + new Date().getTime();
    }
  }

  function scheduleNextMinuteUpdate() {
    var now = new Date();
    var msToNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
    
    setTimeout(function () {
      render();
      scheduleNextMinuteUpdate();
    }, msToNextMinute + 50);
  }

  // 初始化调用
  render();
  scheduleNextMinuteUpdate();
})();
</script>

</body>
</html>
