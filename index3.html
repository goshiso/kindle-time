<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock For Kindle</title>
<style>
  @font-face {
    font-family: TIME;
    src: url("fix7.ttf") format("truetype");
  }

  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: white;
    overflow: hidden;
  }

  .app {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  .time {
    font-family: TIME, sans-serif;
    /* 字号已调小至 180px，如果还觉得大，可以继续调低这个数值 */
    font-size: 120px;  
    text-align: center;
    line-height: 1;
    color: red;
    white-space: nowrap;
    display: flex;
    align-items: center;
  }

  /* 强制冒号使用系统字体以显示为圆形，并微调大小 */
  .dot {
    font-family: sans-serif;
    margin: 0 10px;
    font-size: 0.9em; 
    position: relative;
    top: -5px; /* 根据视觉效果微调冒号高度 */
  }
</style>
</head>
<body>

<div class="app">
  <div class="time" id="clock">
    <span id="hh">00</span><span class="dot">:</span><span id="mm">00</span>
  </div>
</div>

<script>
(function(){
  var domHH = document.getElementById('hh');
  var domMM = document.getElementById('mm');

  function render() {
    var now = new Date();
    
    // 如果需要强制 +9 时区，请取消下面注释
    
    var len = now.getTime();
    var offset = now.getTimezoneOffset() * 60000;
    var utcTime = len + offset;
    now = new Date(utcTime + 3600000 * 9); 
    

    function pad2(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    var hh = pad2(now.getHours());
    var mm = pad2(now.getMinutes());

    if (domHH.innerHTML !== hh) domHH.innerHTML = hh;
    if (domMM.innerHTML !== mm) domMM.innerHTML = mm;
  }

  function scheduleNextMinuteUpdate() {
    var now = new Date();
    var msToNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
    
    setTimeout(function () {
      render();
      scheduleNextMinuteUpdate();
    }, msToNextMinute + 50);
  }

  render();
  scheduleNextMinuteUpdate();
})();
</script>

</body>
</html>
