<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件列表读取</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            line-height: 1.6;
        }
        .file-list {
            list-style: none;
            padding: 0;
        }
        .file-item {
            background: #f4f4f4;
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 4px;
            border-left: 4px solid #007bff;
        }
        .file-info {
            font-size: 0.85em;
            color: #666;
        }
        .error {
            color: #d9534f;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>历史文件列表 (history_*)</h2>
    <div id="status">正在加载数据...</div>
    <ul id="fileList" class="file-list"></ul>

    <script>
        const API_URL = 'http://192.168.68.68/list';

        async function fetchFiles() {
            const listElement = document.getElementById('fileList');
            const statusElement = document.getElementById('status');

            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP 错误! 状态码: ${response.status}`);
                }

                const data = await response.json();

                // 过滤以 history_ 开头的文件
                const historyFiles = data.filter(item => 
                    item.name.startsWith('history_') && item.type === 'file'
                );

                statusElement.innerText = historyFiles.length > 0 ? "" : "未发现匹配的历史文件。";

                // 渲染列表
                historyFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    
                    // 将 Unix 时间戳转换为本地时间格式
                    const date = new Date(file.time * 1000).toLocaleString();
                    
                    li.innerHTML = `
                        <strong>${file.name}</strong>
                        <div class="file-info">最后修改时间: ${date}</div>
                    `;
                    listElement.appendChild(li);
                });

            } catch (error) {
                console.error('获取数据失败:', error);
                statusElement.innerHTML = `<span class="error">无法读取数据: ${error.message}</span>`;
            }
        }

        // 页面加载后执行
        fetchFiles();
    </script>
</body>
</html>
