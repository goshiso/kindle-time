<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件列表读取</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            line-height: 1.6;
        }
        .file-list {
            list-style: none;
            padding: 0;
        }
        .file-item {
            background: #f4f4f4;
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 4px;
            border-left: 4px solid #007bff;
        }
        .file-info {
            font-size: 0.85em;
            color: #666;
        }
        .error {
            color: #d9534f;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>历史文件列表 (history_*)</h2>
    <div id="status">正在加载数据...</div>
    <ul id="fileList" class="file-list"></ul>

    <script>
        // 1. 定义中转 IP 的数据源
        const CONFIG_URL = 'https://goshiso.github.io/kindle-time/text';

        async function fetchFiles() {
            const listElement = document.getElementById('fileList');
            const statusElement = document.getElementById('status');

            try {
                // 2. 第一步：获取 tf (IP地址)
                const configResponse = await fetch(CONFIG_URL);
                if (!configResponse.ok) throw new Error('无法获取配置 IP');
                
                const configData = await configResponse.json();
                const targetIp = configData.tf; // 提取 tf 字段
                
                if (!targetIp) throw new Error('配置中未发现有效的 IP 地址');

                // 3. 第二步：拼接最终的 API 地址
                const API_URL = `http://${targetIp}/list`;

                // 4. 第三步：获取文件列表（后续逻辑保持不变）
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP 错误! 状态码: ${response.status}`);
                }

                const data = await response.json();

                // 过滤以 history_ 开头的文件
                const historyFiles = data.filter(item => 
                    item.name.startsWith('history_') && item.type === 'file'
                );

                statusElement.innerText = historyFiles.length > 0 ? "" : "未发现匹配的历史文件。";

                // 渲染列表
                listElement.innerHTML = ''; // 清空之前的加载提示
                historyFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    
                    const date = new Date(file.time * 1000).toLocaleString();
                    
                    li.innerHTML = `
                        <strong>${file.name}</strong>
                        <div class="file-info">最后修改时间: ${date}</div>
                    `;
                    listElement.appendChild(li);
                });

            } catch (error) {
                console.error('获取数据失败:', error);
                statusElement.innerHTML = `<span class="error">运行出错: ${error.message}</span>`;
            }
        }

        fetchFiles();
    </script>
</body>
</html>
