<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF卡文件管理器</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1100px; /* 稍微调宽以适应时间列 */
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
        }

        .status-bar {
            background: #ebf5ff;
            color: #0056b3;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #fafafa;
            color: #666;
        }

        .file-name {
            font-weight: 500;
            color: #333;
        }

        .time-text {
            color: #7f8c8d;
            font-size: 13px;
            white-space: nowrap;
        }

        .type-tag {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #eee;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-preview { background-color: #3498db; color: white; }
        .btn-preview:hover { background-color: #2980b9; }

        .btn-download { background-color: #2ecc71; color: white; }
        .btn-download:hover { background-color: #27ae60; }

        .btn-delete { background-color: #e74c3c; color: white; }
        .btn-delete:hover { background-color: #c0392b; }

        .error-msg {
            background: #fff1f0;
            color: #cf1322;
            border: 1px solid #ffa39e;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TF卡文件列表</h1>
    <div id="status" class="status-bar">正在初始化系统...</div>
    <div id="error-container"></div>

    <table id="main-table" style="display: none;">
        <thead>
        <tr>
            <th>名称</th>
            <th>类型</th>
            <th>最后修改时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<script>
    let tfIp = "";

    async function init() {
        const status = document.getElementById('status');
        const errorContainer = document.getElementById('error-container');

        try {
            status.innerText = "正在获取中心服务器 IP...";
            const ipRes = await fetch('https://goshiso.github.io/kindle-time/text');
            const centerIp = (await ipRes.text()).trim();

            status.innerText = `正在连接中心服务器 (${centerIp})...`;
            const recordRes = await fetch(`http://${centerIp}/record`);
            const recordData = await recordRes.json();

            tfIp = recordData.tf;
            if (!tfIp) throw new Error("无法从 record 接口获取 TF IP");

            await refreshList();

        } catch (err) {
            errorContainer.innerHTML = `<div class="error-msg">初始化失败: ${err.message}</div>`;
            status.innerText = "状态：异常";
        }
    }

    // 辅助格式化时间函数
    function formatTime(timestamp) {
        if (!timestamp) return "--";
        // 假设 timestamp 是秒级时间戳，乘以 1000 转为毫秒级
        const date = new Date(timestamp * 1000);
        return date.toLocaleString('zh-CN', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    async function refreshList() {
        const status = document.getElementById('status');
        const table = document.getElementById('main-table');
        const tbody = document.getElementById('list-body');

        try {
            status.innerText = `正在读取 TF 卡目录 (${tfIp})...`;
            const listRes = await fetch(`http://${tfIp}/list`);
            let files = await listRes.json();

            // 核心修改：按时间降序排序（最新的在上面）
            // 注意：这里假设 ESP32 返回的字段名为 time
            files.sort((a, b) => (b.time || 0) - (a.time || 0));

            tbody.innerHTML = '';
            files.forEach(file => {
                const tr = document.createElement('tr');
                const isFile = file.type !== 'dir';

                const previewUrl = `http://${tfIp}/${file.name}`;
                const downloadUrl = `http://${tfIp}/download?path=${file.name}`;

                tr.innerHTML = `
                    <td class="file-name">${file.name}</td>
                    <td><span class="type-tag">${file.type === 'dir' ? '文件夹' : '文件'}</span></td>
                    <td class="time-text">${formatTime(file.time)}</td>
                    <td class="actions">
                        ${isFile ? `<a href="${previewUrl}" class="btn btn-preview" target="_blank">预览</a>` : ''}
                        ${isFile ? `<a href="${downloadUrl}" class="btn btn-download" target="_blank">下载</a>` : ''}
                        <button class="btn btn-delete" onclick="doDelete('${file.name}')">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            table.style.display = 'table';
            status.innerText = `就绪 - 当前 TF 地址: ${tfIp}`;
        } catch (err) {
            status.innerText = "读取列表失败";
            console.error(err);
        }
    }

    async function doDelete(fileName) {
        const status = document.getElementById('status');
        try {
            status.innerText = `正在请求删除: ${fileName}...`;
            const res = await fetch(`http://${tfIp}/delete?path=${fileName}`);

            if (res.ok) {
                await refreshList();
            } else {
                alert("删除失败，请检查 ESP32 端权限");
            }
        } catch (err) {
            alert("请求错误: " + err.message);
        } finally {
            status.innerText = `就绪 - 当前 TF 地址: ${tfIp}`;
        }
    }

    init();
</script>

</body>
</html>
