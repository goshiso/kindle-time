<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统加载中...</title>
    <style>
        /* 移除 body 的默认边距，防止 iframe 出现白边 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f5f5f5;
            overflow: hidden; /* 隐藏外层滚动条，完全由 iframe 内部接管 */
        }
        
        /* 状态提示框的样式 */
        .status-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }
        
        .box {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        #status {
            color: #333;
            font-size: 18px;
            margin: 0;
        }
        
        .error {
            color: red !important;
        }

        /* iframe 默认隐藏，加载成功后显示 */
        #main-frame {
            display: none;
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div class="status-container" id="status-container">
        <div class="box">
            <h2 id="status">初始化加载流程...</h2>
        </div>
    </div>

    <iframe id="main-frame" src=""></iframe>

    <script>
        async function startLoadProcess() {
            const statusEl = document.getElementById('status');
            const statusContainer = document.getElementById('status-container');
            const mainFrame = document.getElementById('main-frame');

            try {
                // 1. 获取 TF 服务器 IP
                statusEl.textContent = "1/3: 正在获取 TF 服务器 IP...";
                const tfResponse = await fetch('https://goshiso.github.io/kindle-time/text');
                
                if (!tfResponse.ok) throw new Error('无法访问 GitHub 获取 TF 服务器 IP');
                
                let tfServerIp = (await tfResponse.text()).trim();
                if (!tfServerIp.startsWith('http')) tfServerIp = 'http://' + tfServerIp;

                // 2. 获取主服务器 IP
                statusEl.textContent = "2/3: 正在连接 TF 服务器获取主节点...";
                const mainResponse = await fetch(`${tfServerIp}/getIP`);
                
                if (!mainResponse.ok) throw new Error('无法从 TF 服务器获取主服务器 IP');

                let mainServerIp = (await mainResponse.text()).trim();
                if (!mainServerIp.startsWith('http')) mainServerIp = 'http://' + mainServerIp;

                // 3. 将 iframe 源设置为目标地址
                statusEl.textContent = "3/3: 获取成功，正在加载页面...";
                const targetUrl = mainServerIp.endsWith('/') ? `${mainServerIp}index` : `${mainServerIp}/index`;
                
                // 设置 iframe 地址
                mainFrame.src = targetUrl;

                // 隐藏状态提示框，显示全屏 iframe
                statusContainer.style.display = 'none';
                mainFrame.style.display = 'block';

            } catch (error) {
                console.error("加载失败:", error);
                statusEl.textContent = `加载失败: ${error.message}`;
                statusEl.className = "error";
            }
        }

        window.onload = startLoadProcess;
    </script>
</body>
</html>
